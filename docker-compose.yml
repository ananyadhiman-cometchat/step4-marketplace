services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mkt_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mkt_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mkt_db
      JWT_SECRET: changeme-use-a-long-random-secret-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      APP_ENV: development
      APP_PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - backend
